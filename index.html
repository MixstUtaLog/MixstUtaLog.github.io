<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mixst Utalog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <div class="search-panel">

        <div class="search-row">
            <div class="input-wrapper">
                <input id="song" class="main-input" placeholder="曲名">
            </div>

            <div class="input-wrapper">
                <input id="artist" class="main-input" placeholder="アーティスト名">
            </div>

            <button id="searchBtn">
                🔍 曲を探す
            </button>
        </div>

    <div class="vtuber-list">
        <input type="checkbox" id="vtuber1" class="vtuber" value="1">
        <label for="vtuber1" class="ito">空奏イト</label>

        <input type="checkbox" id="vtuber2" class="vtuber" value="2">
        <label for="vtuber2" class="san">天吹サン</label>

        <input type="checkbox" id="vtuber3" class="vtuber" value="3">
        <label for="vtuber3" class="lian">小鈴りあん</label>

        <input type="checkbox" id="vtuber4" class="vtuber" value="4">
        <label for="vtuber4" class="qalu">雪白キャル</label>

        <input type="checkbox" id="vtuber5" class="vtuber" value="5">
        <label for="vtuber5" class="rimu">星乃りむ</label>

        <input type="checkbox" id="vtuber6" class="vtuber" value="6">
        <label for="vtuber6" class="myao">成海ミャオ</label>

        <input type="checkbox" id="vtuber7" class="vtuber" value="7">
        <label for="vtuber7" class="iori">琴宮いおり</label>

        <input type="checkbox" id="vtuber8" class="vtuber" value="8">
        <label for="vtuber8" class="shichi">渚沢シチ</label>
    </div>


        <div class="filter-row">
            <div>
                <span class="info-icon">i
                    <span class="tooltiptext">
                        OR：選んだメンバーのうち誰か1人でも歌った曲<br>
                        AND：選んだメンバー全員が一緒に歌った曲
                    </span>
                </span>
                <select id="vtuber_mode">
                    <option value="OR" selected>OR</option>
                    <option value="AND">AND</option>
                </select>
            </div>

            <div>
                外部コラボ：
                <select name="external_mode" id="external_mode">
                    <option value="all" selected>すべて</option>
                    <option value="only">外部コラボのみ</option>
                    <option value="exclude">ミクストのみ</option>
                </select>
            </div>

            <div>
                期間：
                <input type="date" id="date_from" value="2024-06-22"> ～
                <input type="date" id="date_to">
            </div>
        </div>

    </div>

    <div id="message"></div>

    <div id="refineWrapper">
    <button id="refineBackBtn" class="back-btn" style="display:none;">←戻る</button>
    <div id="refineLabel"></div>
    <div id="refineArea"></div>
</div>

    <div id="resultControls">
        <div id="pagination">
            <button id="prevPage">◀</button>
            <input type="number" id="pageInput" class="page-input" min="1">
            <button id="nextPage">▶</button>
            / <span id="maxPage"></span>
            <span style="margin-left:10px; color:#666;">
                （全<span id="totalCount"></span>件）
            </span>
        </div>

        <div id="sortControls">
            並び替え：
            <select id="sort_column">
                <option value="date" selected>日付</option>
                <option value="song">曲名</option>
                <option value="artist">アーティスト</option>
            </select>

            <select id="sort_order">
                <option value="desc" selected>降順</option>
                <option value="asc">昇順</option>
            </select>
        </div>
    </div>

    <div id="result"></div>

    <div id="bottomPagination">
        <button id="prevPageBottom">◀</button>
        <button id="nextPageBottom">▶</button>
    </div>

</div>

<footer class="footer">
  <a href="FAQ/"
    target = "_blank">FAQ</a> |
  <a href="https://forms.gle/G4PGrdtgJSE6Bp7k9"
    target="_blank">問題報告</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script type="module" src="/js/features/search/index.js"></script>

</body>
</html>
